name: Fiber Node — Migrate & Run

on:
  workflow_dispatch:
    inputs:
      fiber_repo:
        description: 'Fiber source repository (e.g. nervosnetwork/fiber)'
        required: true
        default: 'nervosnetwork/fiber'
      fiber_ref:
        description: 'Branch / tag / commit SHA to build'
        required: true
        default: 'main'
      store_date:
        description: 'DB date (YYYYMMDD), leave empty to use today'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  migrate-and-run:
    name: Build → Migrate → Run
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Normalize fiber_repo input
        run: |
          REPO="${{ inputs.fiber_repo }}"
          REPO=$(echo "$REPO" | sed 's|https://github.com/||;s|\.git$||')
          echo "FIBER_REPO=${REPO}" >> "$GITHUB_ENV"

      - name: Resolve store URL
        run: |
          DATE="${{ inputs.store_date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date +%Y%m%d)
          fi
          echo "STORE_URL=http://18.163.221.211:8888/fiber-db-${DATE}.tar.gz" >> "$GITHUB_ENV"
          echo "▶ Store URL: http://18.163.221.211:8888/fiber-db-${DATE}.tar.gz"

      - name: Checkout fiber source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FIBER_REPO }}
          ref: ${{ inputs.fiber_ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev make curl ca-certificates

      - name: Build fnn & fnn-migrate (portable)
        run: |
          export BUILD_ROOT=$(pwd)

          echo "▶ Building OpenSSL 1.1.1s (static) …"
          curl -sSLO https://www.openssl.org/source/openssl-1.1.1s.tar.gz
          tar -xzf openssl-1.1.1s.tar.gz
          cd openssl-1.1.1s
          ./Configure linux-x86_64 shared
          make -j"$(nproc)"
          cd ..

          export OPENSSL_LIB_DIR="${BUILD_ROOT}/openssl-1.1.1s"
          export OPENSSL_INCLUDE_DIR="${BUILD_ROOT}/openssl-1.1.1s/include"
          export OPENSSL_STATIC=1

          echo "▶ Building fnn (release, portable) …"
          cargo build --release --locked --features portable

          echo "▶ Building fnn-migrate (release) …"
          cd migrate && cargo build --release --locked && cd ..

      - name: Print binary versions
        run: |
          echo "===== fnn version ====="
          ./target/release/fnn --version || true
          echo "===== fnn-migrate version ====="
          ./migrate/target/release/fnn-migrate --version || true

      - name: Create working directories
        run: mkdir -p ckb fiber

      - name: Write CKB key
        run: |
          printf '%s' "${{ secrets.CKB_KEY }}" > ckb/key
          chmod 600 ckb/key

      - name: Download & extract store DB
        run: |
          echo "▶ Downloading store archive …"
          curl -fsSL \
            -u "${{ secrets.STORE_USERNAME }}:${{ secrets.STORE_PASSWORD }}" \
            "${{ env.STORE_URL }}" \
            -o /tmp/store_archive.tar.gz

          echo "▶ Archive contents (top 20 lines):"
          tar -tzf /tmp/store_archive.tar.gz | head -20

          echo "▶ Extracting into fiber/ …"
          tar -xzf /tmp/store_archive.tar.gz -C fiber/

          echo "▶ fiber/ directory after extraction:"
          ls -la fiber/

      - name: Run fnn-migrate
        run: |
          BINARY="./migrate/target/release/fnn-migrate"

          echo "▶ Running: $BINARY -d fiber/ …"

          MIGRATE_OUTPUT=$(printf 'YES\n' | "$BINARY" -d fiber/ 2>&1) || true
          echo "$MIGRATE_OUTPUT"

          if echo "$MIGRATE_OUTPUT" | grep -q "no need to migrate"; then
            echo "❌ DB reports no migration needed — the store DB may already be at this version. Aborting."
            exit 1
          elif echo "$MIGRATE_OUTPUT" | grep -q "db migrated successfully"; then
            echo "✅ Migration completed successfully."
          else
            echo "❌ Migration did not complete as expected, please check the output above."
            exit 1
          fi

      - name: Copy testnet config
        run: |
          cp config/testnet/config.yml ./config.yml
          echo "Config copied."

      - name: Start fiber node
        env:
          FIBER_SECRET_KEY_PASSWORD: ${{ secrets.FIBER_SECRET_KEY_PASSWORD }}
          RUST_LOG: info
        run: |
          echo "▶ Starting fnn, will run for 30 seconds then print logs and exit …"

          ./target/release/fnn -c config.yml -d . > /tmp/fnn.log 2>&1 &
          FNN_PID=$!
          echo "fnn PID: ${FNN_PID}"

          sleep 30

          if ! kill -0 "$FNN_PID" 2>/dev/null; then
            echo "❌ fnn process exited unexpectedly within 30 seconds, startup failed."
            echo "===== fnn logs ====="
            cat /tmp/fnn.log
            exit 1
          fi

          echo "✅ fnn node is running normally (alive for 30 seconds)."
          echo "===== fnn startup logs (first 30 seconds) ====="
          cat /tmp/fnn.log

          kill "$FNN_PID" 2>/dev/null || true
          wait "$FNN_PID" 2>/dev/null || true
          echo "✅ fnn stopped, CI job exiting."
